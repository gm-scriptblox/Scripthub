<!DOCTYPE html>
<html>
<head>
  <title>Paste Proxy</title>
</head>
<body>
<pre id="content">Loading...</pre>
<script>
const path = window.location.pathname.slice(1); // removes the leading /
fetch('https://paste.rs/' + path)
  .then(r => r.text())
  .then(t => document.getElementById('content').textContent = t)
  .catch(e => document.getElementById('content').textContent = 'Error fetching paste.');
</script>
</body>
</html>
