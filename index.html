<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scripthub Proxy</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background-color: #f5f5f5;
    }
    pre {
      background: #fff;
      border: 1px solid #ccc;
      padding: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
<h1>Scripthub Paste Proxy</h1>
<pre id="content">Loading paste...</pre>

<script>
  // Get the path after /Scripthub/
  let path = window.location.pathname.split("/Scripthub/")[1] || "";
  if (!path) {
    document.getElementById("content").textContent = "No paste ID provided in URL.";
  } else {
    // Use a free CORS proxy to fetch paste.rs
    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://paste.rs/" + path))
      .then(r => r.text())
      .then(t => document.getElementById("content").textContent = t)
      .catch(e => document.getElementById("content").textContent = "Error fetching paste.");
  }
</script>
</body>
</html>
